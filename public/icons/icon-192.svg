<svg xmlns="http://www.w3.org/2000/svg" width="192" height="192" viewBox="0 0 512 512">
  <rect width="512" height="512" rx="96" fill="#0a0a0a"/>

  <!-- Pixel bug mascot - green shield bug inspired by pixel art style -->
  <!-- Body: rounded shield/rectangular shape -->
  <rect x="176" y="200" width="160" height="144" rx="16" fill="#00cc44"/>

  <!-- Head: wider rectangle on top -->
  <rect x="192" y="148" width="128" height="72" rx="12" fill="#00dd55"/>

  <!-- Antennae (distinguishing from ears - these curve outward) -->
  <rect x="208" y="112" width="12" height="44" rx="6" fill="#00dd55"/>
  <rect x="292" y="112" width="12" height="44" rx="6" fill="#00dd55"/>
  <!-- Antenna tips - small circles -->
  <circle cx="214" cy="108" r="10" fill="#00ff66"/>
  <circle cx="298" cy="108" r="10" fill="#00ff66"/>

  <!-- Eyes: square pixel-art style -->
  <rect x="216" y="168" width="24" height="24" rx="4" fill="#0a0a0a"/>
  <rect x="272" y="168" width="24" height="24" rx="4" fill="#0a0a0a"/>
  <!-- Eye shine -->
  <rect x="230" y="172" width="8" height="8" rx="2" fill="#33ff77"/>
  <rect x="286" y="172" width="8" height="8" rx="2" fill="#33ff77"/>

  <!-- Mouth: small line -->
  <rect x="240" y="202" width="32" height="6" rx="3" fill="#0a0a0a" opacity="0.5"/>

  <!-- Shell/wing pattern on body (beetle-like) -->
  <line x1="256" y1="216" x2="256" y2="336" stroke="#00aa33" stroke-width="4" stroke-linecap="round"/>

  <!-- Shell segments -->
  <rect x="184" y="248" width="64" height="4" rx="2" fill="#00aa33" opacity="0.6"/>
  <rect x="264" y="248" width="64" height="4" rx="2" fill="#00aa33" opacity="0.6"/>
  <rect x="184" y="296" width="64" height="4" rx="2" fill="#00aa33" opacity="0.6"/>
  <rect x="264" y="296" width="64" height="4" rx="2" fill="#00aa33" opacity="0.6"/>

  <!-- Legs: 6 stubby pixel legs (3 per side) -->
  <!-- Left legs -->
  <rect x="148" y="228" width="36" height="16" rx="8" fill="#00bb44"/>
  <rect x="148" y="268" width="36" height="16" rx="8" fill="#00bb44"/>
  <rect x="148" y="308" width="36" height="16" rx="8" fill="#00bb44"/>
  <!-- Right legs -->
  <rect x="328" y="228" width="36" height="16" rx="8" fill="#00bb44"/>
  <rect x="328" y="268" width="36" height="16" rx="8" fill="#00bb44"/>
  <rect x="328" y="308" width="36" height="16" rx="8" fill="#00bb44"/>

  <!-- Feet: bottom two stubby legs -->
  <rect x="200" y="344" width="24" height="28" rx="8" fill="#00bb44"/>
  <rect x="288" y="344" width="24" height="28" rx="8" fill="#00bb44"/>

  <!-- Small shield emblem on chest -->
  <path d="M248 250 L256 244 L264 250 L264 264 C264 268 260 272 256 274 C252 272 248 268 248 264 Z" fill="#00ff66" opacity="0.7"/>
</svg>
